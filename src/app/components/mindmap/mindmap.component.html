<div class="mindmap-wrap">
  <div class="mindmap-header">
    <div class="mm-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="3" fill="#20b8cd"/>
        <circle cx="4" cy="6" r="2.5" fill="#7c6af7"/>
        <circle cx="20" cy="6" r="2.5" fill="#f7a26a"/>
        <circle cx="4" cy="18" r="2.5" fill="#5ecb8a"/>
        <circle cx="20" cy="18" r="2.5" fill="#f76a8a"/>
        <line x1="12" y1="12" x2="4" y2="6" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
        <line x1="12" y1="12" x2="20" y2="6" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
        <line x1="12" y1="12" x2="4" y2="18" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
        <line x1="12" y1="12" x2="20" y2="18" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
      </svg>
      Mind Map
    </div>
    <span class="mm-hint">Drag to pan · Hover nodes to explore</span>
  </div>

  <div class="canvas-container">
    <canvas
      #canvas
      (mousemove)="onMouseMove($event)"
      (mousedown)="onMouseDown($event)"
      (mouseup)="onMouseUp()"
      (mouseleave)="onMouseLeave()"
    ></canvas>
  </div>
</div>
