<div class="gen-page">
  <div class="page-header">
    <h2>Profile Settings</h2>
  </div>

  <div class="profile-container">
    @if (successMessage()) {
      <div class="success-banner">
        <span>{{ successMessage() }}</span>
      </div>
    }
    @if (errorMessage()) {
      <div class="error-banner">
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <div class="profile-card">
      <div class="avatar-section">
        <div class="avatar-circle">
          {{ getInitials() }}
        </div>
        <div class="avatar-info">
          <h3>{{ fullName() || 'User' }}</h3>
          <p>{{ auth.currentUser()?.email }}</p>
        </div>
      </div>

      <form (submit)="$event.preventDefault(); onSave()" class="profile-form">
        <div class="form-row">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input 
              type="text" 
              id="fullName" 
              name="fullName" 
              [ngModel]="fullName()" 
              (ngModelChange)="fullName.set($event)"
              required
            />
          </div>

          <div class="form-group">
            <label for="phoneNumber">Phone Number</label>
            <input 
              type="tel" 
              id="phoneNumber" 
              name="phoneNumber" 
              [ngModel]="phoneNumber()" 
              (ngModelChange)="phoneNumber.set($event)"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="bio">Bio</label>
          <textarea 
            id="bio" 
            name="bio" 
            rows="4" 
            placeholder="Tell us about yourself..."
            [ngModel]="bio()" 
            (ngModelChange)="bio.set($event)"
          ></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="logout-btn" (click)="auth.logout()">
            Log Out
          </button>
          <button type="submit" class="save-btn" [disabled]="isSaving()">
            {{ isSaving() ? 'Saving...' : 'Save Changes' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
